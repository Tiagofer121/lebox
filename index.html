<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h2>Iniciar sesión</h2>
<input type="email" id="emailLogin" placeholder="Email">
<input type="password" id="passwordLogin" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

    <p onclick="showRegister()">¿No tenés cuenta? Registrate</p>
  </div>

  <!-- REGISTRO -->
  <div class="card" id="registerCard" style="display:none;">
    <h2>Registrarse</h2>
<input type="email" id="emailRegister" placeholder="Email">
<input type="password" id="passwordRegister" placeholder="Contraseña">
<input type="password" id="confirmRegister" placeholder="Confirmar contraseña">
<button onclick="register()">Registrarse</button>
    <p onclick="showLogin()">¿Ya tenés cuenta? Iniciar sesión</p>
  </div>

</div>


<script  type="module" src="js/app.js"></script>
</body>
</html>
